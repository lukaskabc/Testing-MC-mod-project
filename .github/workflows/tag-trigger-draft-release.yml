# To trigger this workflow, create a new tag following the format "vX.Y.Z"
#   The format is semantic version (https://semver.org/) prefixed with "v"
#
# This is an ALTERNATIVE to the manual-trigger-draft-release.yml
#
# This is testing project, using bleeding edge from development branch
#     IF YOU ARE READING THIS, DONT DO THAT, USE SPECIFIC VERSION

name: Draft new GitHub release (tag push)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      # Note that this is not regex, it is a pattern that matches something that looks like semantic versioning
      # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#filter-pattern-cheat-sheet
      # The version will be validated by the workflow itself once run and will fail if the format is invalid https://semver.org/

# permissions required to create the GitHub release draft and to commit version bumps to the repository
permissions:
  contents: write

jobs:
  # Extracts only the version (strips leading "v") from the tag name
  extract-version:
    name: "Extract the version number"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.strip-v.outputs.version }}
    steps:
      - name: Strip leading "v" from tag name
        id: strip-v
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  draft-release:
    name: Draft new GitHub release
    needs: extract-version
    uses: lukaskabc/Minecraft-Mod-Publish-Workflows/.github/workflows/draft-release.yml@development
    with:
      workflow_ref: "development"

      version: ${{ needs.extract-version.outputs.version }}
      validate-only: false